services:
  - type: web
    name: loop-chat-backend
    runtime: node
    buildCommand: cd server && npm install --include=dev && npm run build
    startCommand: cd server && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a secure 256-bit secret key
      - key: MONGODB_URI
        sync: false # You will paste your MongoDB Atlas string here on the dashboard
      - key: CLIENT_URL
        sync: false # You will paste your Vercel URL here once the frontend is deployed
